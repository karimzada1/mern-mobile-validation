version: '3.9'

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'

  mobile-validation-service:
    build: ./mobile-validation-service
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      NUMVERIFY_API_KEY: ${NUMVERIFY_API_KEY:-}

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/mern-items
      VALIDATION_SERVICE_URL: http://mobile-validation-service:3001
    depends_on:
      - mongodb
      - mobile-validation-service

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  mongo_data:
