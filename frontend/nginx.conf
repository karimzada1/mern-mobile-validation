server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Forward /api requests to the backend service
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
